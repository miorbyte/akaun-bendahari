<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Sistem Laporan Bendahari</title>
    <link href="https://fonts.googleapis.com/css2?family=Mrs+Saint+Delafield&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; }
        body { font-family: 'Poppins', sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .paper { max-width: 900px; margin: auto; background: white; padding: 50px; shadow: 0 0 10px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        
        h2 { text-align: center; text-transform: uppercase; color: var(--primary); }
        .input-area { background: #eef2f3; padding: 20px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #ddd; }
        
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ccc; padding: 12px; text-align: left; }
        th { background: #f8f9fa; }

        /* Bahagian Tandatangan */
        .sig-container { margin-top: 50px; width: 300px; }
        .sig-font { 
            font-family: 'Mrs Saint Delafield', cursive; 
            font-size: 45px; 
            color: #1a2a6c;
            margin-bottom: -15px;
            padding-left: 10px;
        }
        .sig-line { border-bottom: 2px solid #333; margin-bottom: 5px; }
        .sig-name { font-weight: bold; text-transform: uppercase; }

        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #27ae60; color: white; margin-bottom: 10px; }
        .btn-print { background: var(--accent); color: white; width: 100%; margin-top: 20px; font-size: 16px; }

        @media print {
            .input-area, .btn, .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .paper { border: none; box-shadow: none; width: 100%; }
        }
    </style>
</head>
<body>

<div class="paper">
    <div class="input-area">
        <h3>1. Maklumat Bendahari</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label>Nama Penuh Bendahari:</label>
                <input type="text" id="in-nama" style="width:100%; padding:8px;" placeholder="Contoh: Ali Bin Abu" oninput="sync()">
            </div>
            <div>
                <label>Jawatan:</label>
                <input type="text" id="in-jawatan" style="width:100%; padding:8px;" placeholder="AJK Bendahari" oninput="sync()">
            </div>
        </div>
    </div>

    <h2>Laporan Kewangan & Ahli</h2>
    
    <div class="no-print">
        <button class="btn btn-add" onclick="tambahBaris()">+ Tambah Baris Transaksi</button>
    </div>

    <table id="jadual-data">
        <thead>
            <tr>
                <th width="50%">Perkara / Nama Ahli</th>
                <th>Tarikh / ID</th>
                <th>Jumlah (RM)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text" placeholder="..." style="width:95%; border:none;"></td>
                <td><input type="text" placeholder="..." style="width:95%; border:none;"></td>
                <td><input type="number" placeholder="0.00" style="width:95%; border:none;"></td>
            </tr>
        </tbody>
    </table>

    <div class="sig-container">
        <p>Disediakan oleh,</p>
        <div id="out-sig" class="sig-font">Nama Bendahari</div>
        <div class="sig-line"></div>
        <div id="out-nama" class="sig-name">(NAMA PENUH)</div>
        <div id="out-jawatan">BENDAHARI</div>
    </div>

    <button class="btn btn-print" onclick="window.print()">Cetak / Simpan PDF</button>
</div>

<script>
    // Fungsi tambah baris baru
    function tambahBaris() {
        const table = document.getElementById("jadual-data").getElementsByTagName('tbody')[0];
        const row = table.insertRow();
        row.innerHTML = `
            <td><input type="text" style="width:95%; border:none;"></td>
            <td><input type="text" style="width:95%; border:none;"></td>
            <td><input type="number" style="width:95%; border:none;"></td>
        `;
    }

    // Fungsi update nama & tandatangan secara live
    function sync() {
        const nama = document.getElementById('in-nama').value;
        const jawatan = document.getElementById('in-jawatan').value;

        document.getElementById('out-sig').innerText = nama || "Nama Bendahari";
        document.getElementById('out-nama').innerText = "(" + (nama.toUpperCase() || "NAMA PENUH") + ")";
        document.getElementById('out-jawatan').innerText = jawatan.toUpperCase() || "BENDAHARI";
    }
</script>

</body>
</html>
