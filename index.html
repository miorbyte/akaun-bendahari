<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Penjana Dokumen & Tandatangan</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f7f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .section-box { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #3498db; }
        
        label { display: block; margin-top: 10px; font-weight: 600; font-size: 0.9em; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }

        /* Bahagian Preview Dokumen */
        #document-preview { margin-top: 40px; padding: 40px; border: 1px solid #eee; background: #fff; min-height: 200px; position: relative; }
        
        /* Gaya Tandatangan Digital */
        .signature-style {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5em;
            color: #1a2a6c;
            margin-bottom: 0;
            line-height: 1;
        }
        
        .signature-box { margin-top: 50px; border-top: 1px solid #333; display: inline-block; min-width: 250px; text-align: center; }
        .designation { font-weight: bold; text-transform: uppercase; font-size: 0.8em; margin-top: 5px; display: block; }
        
        button { background: #3498db; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <h2>Data Entry Laporan</h2>

    <div class="section-box">
        <h3>Butiran Bendahari</h3>
        <label>Nama Penuh Bendahari:</label>
        <input type="text" id="namaBendahari" placeholder="Contoh: Ahmad Fauzi Bin Ismail" oninput="updatePreview()">
        
        <label>Jawatan:</label>
        <select id="jawatanBendahari" onchange="updatePreview()">
            <option value="Bendahari Kehormat">Bendahari Kehormat</option>
            <option value="Penolong Bendahari">Penolong Bendahari</option>
            <option value="AJK Bendahari">AJK Bendahari</option>
        </select>
    </div>

    <div class="section-box">
        <h3>Kandungan Ringkas</h3>
        <label>Perkara/Tajuk:</label>
        <input type="text" id="tajukLaporan" placeholder="Masukkan tajuk..." oninput="updatePreview()">
    </div>

    <button onclick="window.print()">Cetak Dokumen</button>

    <hr>

    <div id="document-preview">
        <h1 id="view-tajuk" style="text-align:center;">[TAJUK LAPORAN]</h1>
        <p>Laporan ini disediakan untuk tujuan rekod kewangan organisasi bagi tahun semasa.</p>
        <p>Segala transaksi telah disemak dan disahkan benar.</p>

        <div style="margin-top: 100px;">
            <p>Disediakan oleh,</p>
            <div class="signature-box">
                <div id="view-signature" class="signature-style">Nama Bendahari</div>
                <span id="view-nama-plain" style="display:block; margin-top:10px;">(NAMA PENUH)</span>
                <span id="view-jawatan" class="designation">BENDAHARI</span>
            </div>
        </div>
    </div>
</div>

<script>
    function updatePreview() {
        // Ambil data dari input
        const nama = document.getElementById('namaBendahari').value;
        const jawatan = document.getElementById('jawatanBendahari').value;
        const tajuk = document.getElementById('tajukLaporan').value;

        // Update bahagian preview
        document.getElementById('view-signature').innerText = nama || "Nama Bendahari";
        document.getElementById('view-nama-plain').innerText = "(" + (nama.toUpperCase() || "NAMA PENUH") + ")";
        document.getElementById('view-jawatan').innerText = jawatan.toUpperCase();
        document.getElementById('view-tajuk').innerText = tajuk.toUpperCase() || "[TAJUK LAPORAN]";
    }
</script>

</body>
</html>
