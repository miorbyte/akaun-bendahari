<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Sistem Yuran AJK Pengurusan KV Kulim</title>
    <link href="https://fonts.googleapis.com/css2?family=Herr+Von+Muellerhoff&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2c3e50; --header-bg: #92d050; --table-border: #000; }
        body { font-family: 'Poppins', sans-serif; background: #f4f4f4; padding: 20px; }
        .wrapper { max-width: 1200px; margin: auto; background: white; padding: 20px; border: 1px solid #ccc; }
        
        /* Header Style ikut imej */
        .main-header { background-color: var(--header-bg); text-align: center; padding: 10px; border: 2px solid var(--table-border); margin-bottom: 20px; }
        .main-header h2 { margin: 0; font-size: 1.2rem; text-transform: uppercase; }

        .section { margin-bottom: 25px; padding: 15px; border: 1px solid #ddd; background: #fafafa; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
        
        /* Jadual Yuran Matriks */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; border: 2px solid var(--table-border); }
        th, td { border: 1px solid var(--table-border); padding: 5px; text-align: center; font-size: 0.8rem; }
        th { background: #b4c6e7; font-weight: bold; text-transform: uppercase; }
        .col-nama { text-align: left; padding-left: 10px; background: #fff; }
        .col-jawatan { background: #fff2cc; }
        .col-bil { width: 30px; background: #b4c6e7; }
        .row-jumlah { background: #b4c6e7; font-weight: bold; }

        /* Input Styles */
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.8rem; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-blue { background: #2e75b6; color: white; }

        /* Signature Area */
        .sig-container { margin-top: 40px; text-align: left; }
        .sig-font { font-family: 'Herr Von Muellerhoff', cursive; font-size: 45px; color: #000; line-height: 0.6; margin-bottom: 5px; }
        
        @media print { .no-print { display: none !important; } .wrapper { border: none; } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="main-header">
        <h2 id="view-title">AJK PENGURUSAN KOLEJ VOKASIONAL KULIM</h2>
        <h2 id="view-subtitle">A/K PENERIMAAN 2025 SEHINGGA 26/2/2026 11:32</h2>
    </div>

    <div class="no-print section">
        <div class="grid">
            <div>
                <label>Tajuk Utama:</label>
                <input type="text" oninput="document.getElementById('view-title').innerText = this.value.toUpperCase()" placeholder="Nama Kolej/Organisasi">
            </div>
            <div>
                <label>Sub-Tajuk:</label>
                <input type="text" oninput="document.getElementById('view-subtitle').innerText = this.value.toUpperCase()" placeholder="Tempoh/Tarikh">
            </div>
            <div>
                <label>Nama Bendahari:</label>
                <input type="text" id="ben-nama" oninput="updateBen()" placeholder="Nama Penuh Bendahari">
            </div>
        </div>
    </div>

    <div class="no-print section">
        <h3>1. Daftar Ahli & Jawatan</h3>
        <div class="grid">
            <input type="text" id="reg-nama" placeholder="Nama Penuh">
            <input type="text" id="reg-ajk" placeholder="Jawatan (cth: Bendahari)">
            <button class="btn btn-blue" onclick="daftarAhli()">Daftar Ahli</button>
        </div>
    </div>

    <div class="no-print section">
        <h3>2. Rekod Bayaran Yuran</h3>
        <div class="grid" style="grid-template-columns: 2fr 1fr 1fr 1fr;">
            <select id="trx-id"></select>
            <select id="trx-bulan">
                <option value="Jan">Januari</option><option value="Feb">Februari</option><option value="Mac">Mac</option>
                <option value="Apr">April</option><option value="Mei">Mei</option><option value="Jun">Jun</option>
                <option value="Jul">Julai</option><option value="Ogo">Ogos</option><option value="Sep">September</option>
                <option value="Okt">Oktober</option><option value="Nov">November</option><option value="Dis">Disember</option>
            </select>
            <input type="number" id="trx-amaun" value="25" placeholder="RM">
            <button class="btn btn-blue" style="background:#28a745" onclick="bayarYuran()">Simpan Bayaran</button>
        </div>
    </div>

    <table id="master-table">
        <thead>
            <tr>
                <th class="col-bil">Bil</th>
                <th>NAMA</th>
                <th>Jawatan</th>
                <th>Jan</th><th>Feb</th><th>Mac</th><th>April</th><th>Mei</th><th>Jun</th>
                <th>Julai</th><th>Ogos</th><th>Sept</th><th>Okt</th>
                <th>JUMLAH</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
        <tfoot>
            <tr class="row-jumlah">
                <td colspan="3">JUMLAH</td>
                <td id="tot-Jan">0</td><td id="tot-Feb">0</td><td id="tot-Mac">0</td><td id="tot-Apr">0</td>
                <td id="tot-Mei">0</td><td id="tot-Jun">0</td><td id="tot-Jul">0</td><td id="tot-Ogo">0</td>
                <td id="tot-Sep">0</td><td id="tot-Okt">0</td>
                <td id="tot-Semua">0</td>
            </tr>
        </tfoot>
    </table>

    <div class="sig-container">
        <p>Disediakan oleh,</p>
        <div id="out-sig" class="sig-font">Tandatangan</div>
        <div style="border-bottom: 1px solid #000; width: 250px;"></div>
        <strong id="out-nama" style="text-transform: uppercase;">(NAMA PENUH)</strong><br>
        <span id="out-ben">Bendahari</span>
    </div>

    <button class="btn btn-blue no-print" style="width:100%; margin-top:30px;" onclick="window.print()">CETAK LAPORAN</button>
</div>

<script>
    let senaraiAhli = [];
    const bulanKeys = ['Jan', 'Feb', 'Mac', 'Apr', 'Mei', 'Jun', 'Jul', 'Ogo', 'Sep', 'Okt'];

    function daftarAhli() {
        const nama = document.getElementById('reg-nama').value;
        const ajk = document.getElementById('reg-ajk').value;
        if(!nama) return;

        let ahli = {
            id: Date.now(),
            nama: nama,
            jawatan: ajk,
            yuran: { Jan:0, Feb:0, Mac:0, Apr:0, Mei:0, Jun:0, Jul:0, Ogo:0, Sep:0, Okt:0 }
        };
        senaraiAhli.push(ahli);
        renderTable();
        updateDropdown();
        document.getElementById('reg-nama').value = '';
        document.getElementById('reg-ajk').value = '';
    }

    function renderTable() {
        const tbody = document.querySelector('#master-table tbody');
        tbody.innerHTML = '';
        let totalBulan = { Jan:0, Feb:0, Mac:0, Apr:0, Mei:0, Jun:0, Jul:0, Ogo:0, Sep:0, Okt:0 };
        let totalKeseluruhan = 0;

        senaraiAhli.forEach((ahli, index) => {
            let rowTotal = 0;
            let row = tbody.insertRow();
            row.innerHTML = `
                <td class="col-bil">${index + 1}</td>
                <td class="col-nama">${ahli.nama}</td>
                <td class="col-jawatan">${ahli.jawatan}</td>
                ${bulanKeys.map(b => {
                    let val = ahli.yuran[b] || "";
                    rowTotal += Number(val);
                    totalBulan[b] += Number(val);
                    return `<td>${val}</td>`;
                }).join('')}
                <td style="font-weight:bold">${rowTotal}</td>
            `;
            totalKeseluruhan += rowTotal;
        });

        // Update Totals di Footer
        bulanKeys.forEach(b => {
            document.getElementById(`tot-${b}`).innerText = totalBulan[b];
        });
        document.getElementById('tot-Semua').innerText = totalKeseluruhan;
    }

    function updateDropdown() {
        const sel = document.getElementById('trx-id');
        sel.innerHTML = '';
        senaraiAhli.forEach(a => {
            let opt = document.createElement('option');
            opt.value = a.id;
            opt.text = a.nama;
            sel.add(opt);
        });
    }

    function bayarYuran() {
        const id = document.getElementById('trx-id').value;
        const bulan = document.getElementById('trx-bulan').value;
        const amaun = document.getElementById('trx-amaun').value;
        
        let ahli = senaraiAhli.find(a => a.id == id);
        if(ahli) {
            ahli.yuran[bulan] = amaun;
            renderTable();
        }
    }

    function updateBen() {
        const n = document.getElementById('ben-nama').value;
        document.getElementById('out-sig').innerText = n || "Tandatangan";
        document.getElementById('out-nama').innerText = n ? "(" + n.toUpperCase() + ")" : "(NAMA PENUH)";
    }
</script>

</body>
</html>
