<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Sistem Pengurusan Kewangan & Resit</title>
    <link href="https://fonts.googleapis.com/css2?family=Mrs+Saint+Delafield&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f8f9fa; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); padding: 20px; }
        .wrapper { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        .section { margin-bottom: 25px; padding: 20px; border: 1px solid #eee; border-radius: 10px; background: #fff; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        h2 { color: var(--primary); font-size: 1.1rem; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-top: 5px; box-sizing: border-box; font-size: 0.9rem; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; font-size: 0.85rem; }
        th { background: #f4f6f7; color: var(--primary); font-weight: 600; }

        /* Signature Area */
        .sig-container { margin-top: 40px; }
        .sig-font { font-family: 'Mrs Saint Delafield', cursive; font-size: 45px; color: #1a2a6c; margin-bottom: -15px; }
        .sig-line { border-bottom: 2px solid #333; width: 250px; margin: 5px 0; }

        .btn { padding: 10px 18px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-save { background: var(--accent); color: white; margin-top: 15px; }
        .btn-receipt { background: #ebf5ee; color: #27ae60; font-size: 0.75rem; border: 1px solid #27ae60; }
        .btn-receipt:hover { background: #27ae60; color: white; }

        @media print { .no-print { display: none !important; } .wrapper { box-shadow: none; border: none; } }
    </style>
</head>
<body>

<div class="wrapper">
    <center><h1 id="disp-tajuk">LAPORAN KEWANGAN ORGANISASI</h1></center>
    <input type="text" class="no-print" placeholder="Tukar Tajuk Akaun Di Sini..." style="margin-bottom:20px; text-align:center;" oninput="document.getElementById('disp-tajuk').innerText = this.value.toUpperCase()">

    <div class="grid no-print">
        <div class="section">
            <h2>Butiran Bendahari</h2>
            <input type="text" id="ben-nama" placeholder="Nama Bendahari" oninput="updateBen()">
            <input type="text" id="ben-jawatan" placeholder="Jawatan" oninput="updateBen()">
        </div>

        <div class="section">
            <h2>Input Ahli & Yuran</h2>
            <input type="text" id="ahli-nama" placeholder="Nama Ahli">
            <input type="text" id="ahli-ajk" placeholder="Jawatan AJK (cth: Setiausaha)">
            <select id="ahli-bulan">
                <option>Januari</option><option>Februari</option><option>Mac</option>
                <option>April</option><option>Mei</option><option>Jun</option>
                <option>Julai</option><option>Ogos</option><option>September</option>
                <option>Oktober</option><option>November</option><option>Disember</option>
            </select>
            <input type="number" id="ahli-amaun" placeholder="Amaun RM">
            <button class="btn btn-save" onclick="tambahAhli()">Simpan & Rekod</button>
        </div>
    </div>

    <div class="section no-print">
        <h2>Input Transaksi Keseluruhan</h2>
        <div class="grid">
            <input type="date" id="trx-tarikh">
            <input type="text" id="trx-perkara" placeholder="Perincian (cth: Bayar Elektrik)">
            <input type="text" id="trx-ref" placeholder="No. Rujukan / Resit">
            <input type="number" id="trx-amaun" placeholder="RM">
        </div>
        <button class="btn btn-save" style="background:#34495e" onclick="tambahTrx()">Rekod Transaksi</button>
    </div>

    <hr>

    <h3>Laporan Status Yuran Keahlian</h3>
    <table id="table-ahli">
        <thead>
            <tr>
                <th>Bil</th>
                <th>Nama</th>
                <th>Jawatan AJK</th>
                <th>Bulan</th>
                <th>Amaun (RM)</th>
                <th class="no-print">Tindakan</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h3>Laporan Transaksi Keseluruhan</h3>
    <table id="table-trx">
        <thead>
            <tr>
                <th>Tarikh</th>
                <th>Perincian</th>
                <th>Rujukan</th>
                <th>Amaun (RM)</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="sig-container">
        <p>Disediakan oleh,</p>
        <div id="out-sig" class="sig-font">Nama Bendahari</div>
        <div class="sig-line"></div>
        <strong id="out-nama">(NAMA PENUH)</strong><br>
        <span id="out-jawatan">BENDAHARI</span>
    </div>

    <button class="btn no-print" style="width:100%; background:var(--primary); color:white; margin-top:40px;" onclick="window.print()">CETAK LAPORAN PENUH</button>
</div>

<script>
    let bil = 1;

    function tambahAhli() {
        const nama = document.getElementById('ahli-nama').value;
        const ajk = document.getElementById('ahli-ajk').value;
        const bulan = document.getElementById('ahli-bulan').value;
        const amaun = document.getElementById('ahli-amaun').value;

        if(!nama || !amaun) return alert("Lengkapkan data ahli!");

        const tbody = document.getElementById('table-ahli').querySelector('tbody');
        const row = tbody.insertRow();
        row.innerHTML = `
            <td>${bil++}</td>
            <td>${nama}</td>
            <td>${ajk}</td>
            <td>${bulan}</td>
            <td>${parseFloat(amaun).toFixed(2)}</td>
            <td class="no-print"><button class="btn btn-receipt" onclick="cetakResit('${nama}', '${bulan}', '${amaun}', '${ajk}')">Resit</button></td>
        `;
        document.getElementById('ahli-nama').value = '';
    }

    function tambahTrx() {
        const tkh = document.getElementById('trx-tarikh').value;
        const pkra = document.getElementById('trx-perkara').value;
        const ref = document.getElementById('trx-ref').value;
        const amt = document.getElementById('trx-amaun').value;

        const tbody = document.getElementById('table-trx').querySelector('tbody');
        const row = tbody.insertRow();
        row.innerHTML = `<td>${tkh}</td><td>${pkra}</td><td>${ref || '-'}</td><td>${parseFloat(amt).toFixed(2)}</td>`;
    }

    function updateBen() {
        const n = document.getElementById('ben-nama').value;
        const j = document.getElementById('ben-jawatan').value;
        document.getElementById('out-sig').innerText = n || "Nama Bendahari";
        document.getElementById('out-nama').innerText = "(" + (n.toUpperCase() || "NAMA PENUH") + ")";
        document.getElementById('out-jawatan').innerText = j.toUpperCase() || "BENDAHARI";
    }

    function cetakResit(nama, bulan, amaun, ajk) {
        const nBen = document.getElementById('ben-nama').value || "Bendahari";
        const tjk = document.getElementById('disp-tajuk').innerText;
        const windowResit = window.open('', '', 'width=400,height=500');
        windowResit.document.write(`
            <html><head><title>Resit Rasmi</title>
            <style>
                body { font-family: sans-serif; padding: 20px; text-align: center; border: 2px solid #333; }
                .line { border-bottom: 1px dashed #333; margin: 10px 0; }
                .sig { font-family: 'Mrs Saint Delafield', cursive; font-size: 30px; }
            </style>
            <link href="https://fonts.googleapis.com/css2?family=Mrs+Saint+Delafield&display=swap" rel="stylesheet">
            </head><body>
                <h3>${tjk}</h3>
                <p><strong>RESIT RASMI YURAN</strong></p>
                <div class="line"></div>
                <p align="left">Diterima daripada: <strong>${nama}</strong><br>Jawatan: ${ajk}<br>Bagi Yuran Bulan: ${bulan}</p>
                <h2>RM ${parseFloat(amaun).toFixed(2)}</h2>
                <div class="line"></div>
                <p align="left">Diterima oleh:<br><span class="sig">${nBen}</span><br>_________________<br>Bendahari</p>
                <button onclick="window.print()">Cetak Resit</button>
            </body></html>
        `);
        windowResit.document.close();
    }
</script>

</body>
</html>
