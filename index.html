<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Sistem Pengurusan Kewangan & Ahli</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        h2, h3 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
        .input-group { margin-bottom: 20px; padding: 15px; border: 1px solid #eee; border-radius: 8px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #3498db; color: white; }

        /* Kotak Bendahari */
        .bendahari-box { background: #e8f4fd; padding: 20px; border-radius: 10px; margin-top: 30px; border: 2px dashed #3498db; }
        
        /* Gaya Tandatangan (Signature) */
        .sig-font { font-family: 'Dancing Script', cursive; font-size: 2.2em; color: #2c3e50; margin-top: 10px; }
        .sig-line { border-top: 1px solid #000; width: 250px; margin-top: 5px; }

        .btn { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #27ae60; color: white; margin-bottom: 10px; }
        .btn-add:hover { background: #219150; }
        .btn-print { background: #34495e; color: white; width: 100%; padding: 15px; font-size: 1.1em; margin-top: 20px; }

        @media print { .btn, .input-group, h2 { display: none; } .container { box-shadow: none; border: none; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistem Data Entry Organisasi</h2>

    <div class="input-group">
        <h3>Senarai Ahli Baru</h3>
        <button class="btn btn-add" onclick="addRow('table-ahli')">+ Tambah Ahli</button>
        <table id="table-ahli">
            <thead>
                <tr>
                    <th>Nama Ahli</th>
                    <th>No. Matrik/ID</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="text" placeholder="Nama penuh" style="width:95%"></td>
                    <td><input type="text" placeholder="ID" style="width:90%"></td>
                    <td><input type="text" placeholder="Aktif" style="width:90%"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="input-group">
        <h3>Rekod Transaksi Kewangan</h3>
        <button class="btn btn-add" onclick="addRow('table-transaksi')">+ Tambah Transaksi</button>
        <table id="table-transaksi">
            <thead>
                <tr>
                    <th>Perkara</th>
                    <th>Tarikh</th>
                    <th>Jumlah (RM)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="text" placeholder="Contoh: Yuran Ahli" style="width:95%"></td>
                    <td><input type="date" style="width:90%"></td>
                    <td><input type="number" placeholder="0.00" style="width:90%"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="bendahari-box">
        <h3>Pengesahan Bendahari</h3>
        <div style="display: flex; gap: 20px;">
            <div style="flex: 1;">
                <label>Nama Bendahari:</label><br>
                <input type="text" id="inputNama" oninput="updateSig()" placeholder="Taip nama di sini..." style="width:100%; padding:8px; margin-top:5px;">
            </div>
            <div style="flex: 1;">
                <label>Jawatan:</label><br>
                <select id="inputJawatan" onchange="updateSig()" style="width:100%; padding:8px; margin-top:5px;">
                    <option value="Bendahari Kehormat">Bendahari Kehormat</option>
                    <option value="AJK Bendahari">AJK Bendahari</option>
                    <option value="Penolong Bendahari">Penolong Bendahari</option>
                </select>
            </div>
        </div>

        <div style="margin-top: 30px; text-align: left;">
            <p>Disediakan oleh,</p>
            <div id="displaySig" class="sig-font">Nama Bendahari</div>
            <div class="sig-line"></div>
            <b id="displayNama">(NAMA PENUH)</b><br>
            <span id="displayJawatan">BENDAHARI KEHORMAT</span>
        </div>
    </div>

    <button class="btn btn-print" onclick="window.print()">Cetak Laporan Lengkap</button>
</div>

<script>
    // Fungsi untuk tambah line/baris baru dalam table
    function addRow(tableId) {
        const table = document.getElementById(tableId).getElementsByTagName('tbody')[0];
        const newRow = table.insertRow();
        
        // Ambil bilangan column dari header table tersebut
        const colCount = document.getElementById(tableId).rows[0].cells.length;

        for (let i = 0; i < colCount; i++) {
            let cell = newRow.insertCell(i);
            let input = document.createElement("input");
            input.type = (i === 1 && tableId === 'table-transaksi') ? "date" : 
                         (i === 2 && tableId === 'table-transaksi') ? "number" : "text";
            input.style.width = "90%";
            input.placeholder = "...";
            cell.appendChild(input);
        }
    }

    // Fungsi untuk update tandatangan secara real-time
    function updateSig() {
        const nama = document.getElementById('inputNama').value;
        const jawatan = document.getElementById('inputJawatan').value;

        document.getElementById('displaySig').innerText = nama || "Nama Bendahari";
        document.getElementById('displayNama').innerText = "(" + (nama.toUpperCase() || "NAMA PENUH") + ")";
        document.getElementById('displayJawatan').innerText = jawatan.toUpperCase();
    }
</script>

</body>
</html>
